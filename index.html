<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>訪視預約媒合系統 - 個人獨立版</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>

  <style>
    @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700;900&display=swap');
    body { font-family: 'Noto Sans TC', sans-serif; }
    ::-webkit-scrollbar { width: 6px; height: 6px; }
    ::-webkit-scrollbar-track { background: #f1f5f9; }
    ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 4px; }
    .hidden-state { display: none !important; }
  </style>
</head>
<body class="bg-slate-50 text-slate-800 min-h-screen">

  <div id="loading-screen" class="fixed inset-0 bg-slate-50 z-50 flex flex-col items-center justify-center">
    <div class="relative w-20 h-20">
      <div class="absolute inset-0 border-4 border-blue-100 rounded-full"></div>
      <div class="absolute inset-0 border-4 border-blue-600 rounded-full border-t-transparent animate-spin"></div>
    </div>
    <p class="text-slate-500 font-bold mt-6 tracking-widest">系統連線中...</p>
  </div>

  <div id="login-screen" class="fixed inset-0 bg-slate-900/10 z-40 flex items-center justify-center backdrop-blur-md hidden-state">
    <div class="bg-white p-10 rounded-3xl shadow-2xl w-[90%] max-w-md border border-white">
      <div class="text-center mb-10">
        <div class="inline-flex items-center justify-center w-20 h-20 bg-blue-600 rounded-2xl shadow-lg mb-6">
          <i class="fa-solid fa-user-lock text-3xl text-white"></i>
        </div>
        <h2 class="text-3xl font-black text-slate-900">個人化系統登入</h2>
        <p class="text-slate-400 font-medium mt-2">請輸入您的名稱進行資料隔離</p>
      </div>
      <div class="space-y-6">
        <input type="text" id="login-id" placeholder="例如: Karen" class="w-full px-6 py-4 bg-slate-50 border-none rounded-2xl focus:ring-2 focus:ring-blue-500 outline-none font-bold">
        <button id="btn-login" class="w-full bg-blue-600 text-white font-black py-4 rounded-2xl hover:bg-blue-700 transition-all flex justify-center items-center gap-3">
          啟動個人系統 <i class="fa-solid fa-chevron-right text-sm"></i>
        </button>
      </div>
    </div>
  </div>

  <div id="main-app" class="hidden-state">
    <nav class="bg-white/80 backdrop-blur-md border-b border-slate-200 px-8 py-4 flex flex-col md:flex-row justify-between items-center gap-4 sticky top-0 z-30">
      <div class="flex items-center gap-4">
        <div class="bg-blue-600 w-10 h-10 rounded-xl flex items-center justify-center shadow-lg">
          <i class="fa-solid fa-calendar-check text-white"></i>
        </div>
        <div>
          <h1 class="text-xl font-black text-slate-900 tracking-tight">訪視預約系統</h1>
          <p class="text-[10px] font-bold text-blue-600 uppercase tracking-widest" id="nav-user-display">USER: LOADING</p>
        </div>
      </div>
      <div class="flex items-center gap-2 bg-slate-100 p-1.5 rounded-2xl">
        <button id="tab-doctor" class="px-6 py-2.5 rounded-xl text-sm font-black transition-all bg-white shadow-sm text-blue-600">我的預約</button>
        <button id="tab-admin" class="px-6 py-2.5 rounded-xl text-sm font-black transition-all text-slate-500">我的媒合後端</button>
        <button id="btn-logout" class="p-2.5 text-red-400 hover:text-red-600 transition-colors"><i class="fa-solid fa-right-from-bracket"></i></button>
      </div>
    </nav>

    <main class="max-w-[1400px] mx-auto p-6 md:p-10">
      <div id="view-doctor" class="space-y-10">
        <div class="grid grid-cols-1 lg:grid-cols-3 gap-10">
          <div class="space-y-6">
            <div class="bg-white p-8 rounded-[2rem] shadow-sm border border-slate-100">
              <h2 class="text-lg font-black mb-6 flex items-center gap-3"><i class="fa-solid fa-sliders text-blue-600"></i> 預約設定</h2>
              <div class="space-y-5">
                <div class="grid grid-cols-2 gap-3" id="period-selector">
                  <button data-val="早上" class="period-btn py-3 rounded-2xl border-2 border-blue-600 bg-blue-50 text-blue-600 font-black text-sm">早上</button>
                  <button data-val="下午" class="period-btn py-3 rounded-2xl border-2 border-transparent bg-slate-50 text-slate-400 font-black text-sm">下午</button>
                </div>
              </div>
            </div>
            <div class="bg-white p-8 rounded-[2rem] shadow-sm border border-slate-100">
              <h2 class="text-lg font-black mb-6 flex items-center gap-3"><i class="fa-solid fa-list-check text-blue-600"></i> 待送出清單</h2>
              <div id="temp-list" class="space-y-3 max-h-[300px] overflow-y-auto pr-2"></div>
              <button id="btn-submit-registrations" class="w-full mt-6 bg-slate-900 text-white py-4 rounded-2xl font-black hover:bg-black transition-all hidden-state">
                確認送出預約 (<span id="temp-count">0</span>)
              </button>
            </div>
          </div>
          <div class="lg:col-span-2 bg-white p-8 md:p-10 rounded-[2rem] shadow-sm border border-slate-100">
            <div class="flex justify-between items-center mb-10">
              <h2 class="text-2xl font-black text-slate-900" id="calendar-title">2026 年 ... 月</h2>
              <div class="flex gap-3">
                <button id="cal-prev" class="w-10 h-10 rounded-xl hover:bg-slate-100 flex items-center justify-center"><i class="fa-solid fa-chevron-left"></i></button>
                <button id="cal-next" class="w-10 h-10 rounded-xl hover:bg-slate-100 flex items-center justify-center"><i class="fa-solid fa-chevron-right"></i></button>
              </div>
            </div>
            <div id="calendar-grid" class="grid grid-cols-7 gap-3 md:gap-4"></div>
          </div>
        </div>
        
        <div class="bg-white p-8 md:p-10 rounded-[2rem] shadow-sm border border-slate-100">
          <div class="flex justify-between items-center mb-8">
            <h2 class="text-2xl font-black text-green-600 flex items-center gap-3"><i class="fa-solid fa-map-location-dot"></i> 我的已確認行程</h2>
            <button id="btn-export-personal" class="bg-green-50 text-green-700 px-5 py-2.5 rounded-xl font-bold text-sm hover:bg-green-100">
              <i class="fa-solid fa-file-excel mr-2"></i>匯出
            </button>
          </div>
          <div id="personal-schedule" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6"></div>
        </div>
      </div>

      <div id="view-admin" class="hidden-state space-y-10">
        <div class="bg-white p-8 md:p-10 rounded-[2rem] shadow-sm border border-slate-100">
          <h2 class="text-2xl font-black mb-8 flex items-center gap-3"><i class="fa-solid fa-hourglass-half text-amber-500"></i> 我的待媒合訪視</h2>
          <div id="admin-pending-list" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6"></div>
        </div>

        <div class="bg-white p-8 md:p-10 rounded-[2rem] shadow-sm border border-slate-100">
          <div class="flex flex-col md:flex-row justify-between items-start md:items-center mb-8 gap-4">
            <h2 class="text-2xl font-black text-slate-900 flex items-center gap-3"><i class="fa-solid fa-clipboard-check text-green-600"></i> 我的行程總表</h2>
            <div class="flex gap-3">
              <button id="btn-export-admin" class="bg-slate-900 text-white px-5 py-2.5 rounded-xl font-black text-xs">匯出總表</button>
            </div>
          </div>
          <div class="overflow-x-auto">
            <table class="w-full text-left min-w-[1000px]">
              <thead class="bg-slate-50 text-[10px] font-black text-slate-400">
                <tr><th class="py-4 px-6">日期時段</th><th class="py-4 px-6">人員</th><th class="py-4 px-6">受訪單位</th><th class="py-4 px-6">地址</th><th class="py-4 px-6"></th></tr>
              </thead>
              <tbody id="admin-history-body" class="divide-y divide-slate-50 font-bold"></tbody>
            </table>
          </div>
        </div>
      </div>
    </main>
  </div>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
    import { getAuth, signInAnonymously, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-auth.js";
    import { getFirestore, collection, doc, setDoc, onSnapshot, addDoc, deleteDoc, updateDoc, query, where } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore.js";

    const firebaseConfig = {
      apiKey: "AIzaSyA9KdHt1Aywhz8FsCjEzogwnWJjGA5ZM98",
      authDomain: "work-use-7df52.firebaseapp.com",
      projectId: "work-use-7df52",
      storageBucket: "work-use-7df52.firebasestorage.app",
      messagingSenderId: "213419380267",
      appId: "1:213419380267:web:69551bca8b888533d0a46e"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);
    const appId = 'doctor-visit-match-system-v3';

    const state = {
      user: null, view: 'doctor', 
      currentMonth: new Date().getMonth(), displayYear: 2026,
      selectedTimePeriod: '早上', tempSelections: [],
      data: { availability: [], assignments: [], units: [] },
      listeners: [] // 用於清理舊的監聽器
    };

    async function init() {
      onAuthStateChanged(auth, (user) => {
        state.user = user;
        if (user) {
          checkLoginStatus();
        } else {
          signInAnonymously(auth).catch(console.error);
        }
      });
    }

    function checkLoginStatus() {
      const storedUser = localStorage.getItem('empName');
      document.getElementById('loading-screen').classList.add('hidden-state');
      if (storedUser) {
        document.getElementById('login-screen').classList.add('hidden-state');
        document.getElementById('main-app').classList.remove('hidden-state');
        document.getElementById('nav-user-display').innerText = `USER: ${storedUser}`;
        setupUserListeners(storedUser);
      } else {
        document.getElementById('login-screen').classList.remove('hidden-state');
        document.getElementById('main-app').classList.add('hidden-state');
      }
    }

    // 核心修改：根據使用者名稱設定獨立的監聽路徑
    function setupUserListeners(userName) {
      // 1. 清理舊監聽（避免重複渲染）
      state.listeners.forEach(unsubscribe => unsubscribe());
      state.listeners = [];

      const safeName = userName.toLowerCase();

      // 獨立的路徑：只聽取屬於該使用者的資料
      const paths = [
        { key: 'availability', path: `artifacts/${appId}/users/${safeName}/availability` },
        { key: 'assignments', path: `artifacts/${appId}/users/${safeName}/assignments` }
      ];

      paths.forEach(p => {
        const unsub = onSnapshot(collection(db, p.path), (snap) => {
          state.data[p.key] = snap.docs.map(d => Object.assign({ id: d.id }, d.data()));
          renderUI();
        });
        state.listeners.push(unsub);
      });

      // 共享的路徑：單位清單
      const unsubUnits = onSnapshot(collection(db, 'artifacts', appId, 'public', 'data', 'units'), (snap) => {
        state.data.units = snap.docs.map(d => Object.assign({ id: d.id }, d.data()));
        renderUI();
      });
      state.listeners.push(unsubUnits);
    }

    function renderUI() {
      document.getElementById('view-doctor').classList.toggle('hidden-state', state.view !== 'doctor');
      document.getElementById('view-admin').classList.toggle('hidden-state', state.view !== 'admin');
      if (state.view === 'doctor') renderDoctorView();
      else renderAdminView();
    }

    function renderDoctorView() {
      const grid = document.getElementById('calendar-grid');
      const tempList = document.getElementById('temp-list');
      const currentUser = localStorage.getItem('empName');
      document.getElementById('calendar-title').innerText = `${state.displayYear} 年 ${state.currentMonth + 1} 月`;
      grid.innerHTML = '';

      const days = new Date(state.displayYear, state.currentMonth + 1, 0).getDate();
      const first = new Date(state.displayYear, state.currentMonth, 1).getDay();

      for(let i=0; i<first; i++) grid.innerHTML += '<div></div>';
      
      for(let d=1; d<=days; d++) {
        const dateStr = `${state.displayYear}-${(state.currentMonth+1).toString().padStart(2,'0')}-${d.toString().padStart(2,'0')}`;
        const isTemp = state.tempSelections.indexOf(dateStr) > -1;
        const myAvail = state.data.availability.find(a => a.date === dateStr && a.timePeriod === state.selectedTimePeriod);
        
        let cls = "bg-white border-slate-100 text-slate-800 hover:border-blue-400";
        if (isTemp) cls = "bg-amber-100 border-amber-400 text-amber-800";
        else if (myAvail) {
          cls = myAvail.status === 'matched' ? "bg-green-100 border-green-200 text-green-700" : "bg-blue-100 border-blue-200 text-blue-700";
        }

        const cell = document.createElement('button');
        cell.className = `aspect-square rounded-2xl border-2 flex flex-col items-center justify-center transition-all ${cls}`;
        cell.innerHTML = `<span class="text-sm font-black">${d}</span>${(isTemp || myAvail) ? `<span class="text-[8px] font-bold mt-1">${state.selectedTimePeriod}</span>` : ''}`;
        cell.onclick = () => toggleDate(dateStr);
        grid.appendChild(cell);
      }

      tempList.innerHTML = state.tempSelections.length ? state.tempSelections.map(d => `
        <div class="p-4 bg-amber-50 rounded-2xl border border-amber-100 flex justify-between items-center">
          <p class="text-xs font-black">${d} ${state.selectedTimePeriod}</p>
          <button onclick="window.removeTemp('${d}')" class="text-amber-300"><i class="fa-solid fa-circle-xmark"></i></button>
        </div>
      `).join('') : `<p class="text-slate-300 text-sm italic text-center py-10">尚無選擇</p>`;
      
      document.getElementById('btn-submit-registrations').classList.toggle('hidden-state', state.tempSelections.length === 0);
      document.getElementById('temp-count').innerText = state.tempSelections.length;

      const myMatches = state.data.assignments.sort((a,b)=>a.date.localeCompare(b.date));
      document.getElementById('personal-schedule').innerHTML = myMatches.length ? myMatches.map(m => `
        <div class="p-6 bg-slate-50 rounded-3xl border border-slate-100 relative overflow-hidden">
          <div class="absolute left-0 top-0 bottom-0 w-1.5 bg-green-500"></div>
          <span class="bg-white text-green-700 px-3 py-1 rounded-xl text-[10px] font-black border border-green-100">${m.date} ${m.preciseTime}</span>
          <h4 class="font-black mt-4">${m.unitName}</h4><p class="text-[10px] text-slate-400 font-bold">${m.unitAddress}</p>
        </div>
      `).join('') : `<div class="col-span-full py-10 text-center text-slate-300 italic">尚無媒合行程</div>`;
    }

    function renderAdminView() {
      const pends = state.data.availability.filter(a => a.status === 'pending');
      const opts = state.data.units.map(u => `<option value="${u.id}">${u.name}</option>`).join('');
      
      document.getElementById('admin-pending-list').innerHTML = pends.length ? pends.map(p => `
        <div class="p-6 bg-white border border-slate-100 rounded-[2rem] shadow-sm space-y-4">
          <div class="flex justify-between">
            <span class="bg-blue-50 text-blue-600 px-3 py-1 rounded-xl text-[10px] font-black">${p.date} ${p.timePeriod}</span>
            <button onclick="window.deleteAvail('${p.id}')" class="text-slate-300 hover:text-red-400"><i class="fa-solid fa-trash-can"></i></button>
          </div>
          <select id="unit-sel-${p.id}" class="w-full bg-slate-50 rounded-xl text-xs font-bold p-3 outline-none"><option value="">指派單位...</option>${opts}</select>
          <div class="flex gap-2">
            <input type="text" id="time-in-${p.id}" placeholder="時間" class="flex-1 bg-slate-50 rounded-xl text-xs font-bold p-3 outline-none">
            <button onclick="window.submitMatch('${p.id}')" class="bg-blue-600 text-white px-5 rounded-xl text-xs font-black">媒合</button>
          </div>
        </div>
      `).join('') : `<p class="col-span-full py-10 text-center text-slate-300 italic">目前無待媒合時段</p>`;

      const hist = state.data.assignments.sort((a,b)=>a.date.localeCompare(b.date));
      document.getElementById('admin-history-body').innerHTML = hist.map(m => `
        <tr class="hover:bg-slate-50">
          <td class="py-4 px-6"><p class="text-sm font-black">${m.date}</p><p class="text-[10px] text-blue-600 font-bold">${m.timePeriod} ${m.preciseTime}</p></td>
          <td class="py-4 px-6 text-sm font-black">${localStorage.getItem('empName')}</td>
          <td class="py-4 px-6 text-sm font-black">${m.unitName}</td>
          <td class="py-4 px-6 text-[10px] text-slate-400 truncate max-w-[200px]">${m.unitAddress}</td>
          <td class="py-4 px-6 text-right"><button onclick="window.deleteMatch('${m.id}', '${m.availabilityId}')" class="text-slate-200 hover:text-red-500"><i class="fa-solid fa-rotate-left"></i></button></td>
        </tr>
      `).join('');
    }

    function toggleDate(dateStr) {
      const idx = state.tempSelections.indexOf(dateStr);
      if (idx > -1) state.tempSelections.splice(idx, 1);
      else {
        if (!state.data.availability.find(a => a.date === dateStr && a.timePeriod === state.selectedTimePeriod)) {
          state.tempSelections.push(dateStr);
        }
      }
      renderUI();
    }

    window.removeTemp = (d) => { state.tempSelections = state.tempSelections.filter(x => x !== d); renderUI(); };
    
    // 核心修改：寫入資料時使用使用者專屬路徑
    window.deleteAvail = (id) => {
      const safeName = localStorage.getItem('empName').toLowerCase();
      if(confirm('確定刪除？')) deleteDoc(doc(db, `artifacts/${appId}/users/${safeName}/availability`, id));
    };

    window.submitMatch = async (aid) => {
      const safeName = localStorage.getItem('empName').toLowerCase();
      const uId = document.getElementById(`unit-sel-${aid}`).value;
      const tVal = document.getElementById(`time-in-${aid}`).value;
      if(!uId || !tVal) return alert('請填寫完整');
      
      const unit = state.data.units.find(u => u.id === uId);
      const avail = state.data.availability.find(a => a.id === aid);

      await addDoc(collection(db, `artifacts/${appId}/users/${safeName}/assignments`), {
        availabilityId: aid, 
        date: avail.date, timePeriod: avail.timePeriod, preciseTime: tVal,
        unitName: unit.name, unitAddress: unit.address, matchedAt: new Date().toISOString()
      });
      await updateDoc(doc(db, `artifacts/${appId}/users/${safeName}/availability`, aid), { status: 'matched' });
      alert('媒合成功！');
    };

    window.deleteMatch = (mid, aid) => {
      const safeName = localStorage.getItem('empName').toLowerCase();
      if(confirm('撤銷媒合？')) {
        deleteDoc(doc(db, `artifacts/${appId}/users/${safeName}/assignments`, mid));
        updateDoc(doc(db, `artifacts/${appId}/users/${safeName}/availability`, aid), { status: 'pending' });
      }
    };

    document.getElementById('btn-login').onclick = () => {
      const val = document.getElementById('login-id').value.trim();
      if (val) {
        localStorage.setItem('empName', val);
        checkLoginStatus();
      } else alert('請輸入名稱');
    };

    document.getElementById('btn-logout').onclick = () => {
      localStorage.removeItem('empName');
      location.reload();
    };

    document.getElementById('btn-submit-registrations').onclick = async () => {
      const safeName = localStorage.getItem('empName').toLowerCase();
      for (const d of state.tempSelections) {
        await addDoc(collection(db, `artifacts/${appId}/users/${safeName}/availability`), {
          date: d, timePeriod: state.selectedTimePeriod,
          createdAt: new Date().toISOString(), status: 'pending'
        });
      }
      state.tempSelections = []; alert('預約已送出！'); renderUI();
    };

    document.querySelectorAll('.period-btn').forEach(b => {
      b.onclick = () => {
        state.selectedTimePeriod = b.dataset.val;
        document.querySelectorAll('.period-btn').forEach(x => x.classList.toggle('border-blue-600', x.dataset.val === state.selectedTimePeriod));
        renderUI();
      };
    });

    document.getElementById('tab-doctor').onclick = () => { state.view = 'doctor'; renderUI(); };
    document.getElementById('tab-admin').onclick = () => { state.view = 'admin'; renderUI(); };
    document.getElementById('cal-prev').onclick = () => { state.currentMonth--; if(state.currentMonth < 0){state.currentMonth=11; state.displayYear--;} renderUI(); };
    document.getElementById('cal-next').onclick = () => { state.currentMonth++; if(state.currentMonth > 11){state.currentMonth=0; state.displayYear++;} renderUI(); };

    init();
  </script>
</body>
</html>
